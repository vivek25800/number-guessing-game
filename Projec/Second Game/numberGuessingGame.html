<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <title>Number Guessing Game</title>
</head>
<body>

    <div class="great-div">
        <div class="parent-container">
            <div class="main-heading-div">
                <h2><span>Number</span> <br/> Guessing Game</h2>
            </div>

            <div class="main-container">
                <!-- <div class="game-div"> -->
                    <div class="heading-div">
                        <h4>Guess the Number</h4>
                        <p>Enter a number between 1 to 100</p>
                    </div>

                    <div class="input-number-div">
                        <input type="text" />
                    </div>

                    <div class="btn-div">
                        <button>Guess</button>
                        <button>Restart</button>
                    </div>

                    <div class="result-div">
                        <p>Hello hii</p>
                    </div>
                    
                    <div class="attemts-div">
                        <p>Attemts: 1</p>
                    </div>
                <!-- </div> -->
            </div>
        </div>

    </div>
    
</body>
</html>
